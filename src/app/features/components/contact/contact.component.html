<div class="min-h-screen bg-[#f0f7ff] flex items-center justify-center p-6 font-sans mt-5">

    <div class="w-full max-w-6xl bg-white rounded-[2.5rem] shadow-sm border border-blue-50 grid grid-cols-1 md:grid-cols-2 overflow-hidden">
        <aside class="fixed left-0 top-0 h-screen w-20 bg-white border-r border-gray-100 hidden md:flex flex-col items-center py-6 gap-8 shadow-sm z-50">
            <div class="text-blue-600 font-bold text-xl">
                <img src="/Picture1.png" routerLink="/dashboard-p" alt="RIVA Logo" class="w-12 hover:scale-105 transition-transform cursor-pointer">
            </div>
            <div class="flex flex-col gap-6 text-gray-400">
                <button class="p-2 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all" routerLink="/dashboard"><i class="fas fa-home"></i></button>
                <button class="p-2 hover:text-blue-600" routerLink="/chat"><i class="fa-brands fa-rocketchat"></i></button>
                <button class="p-2 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all" routerLink="/myprofile"><i class="fa-solid fa-circle-user"></i></button>
                <button class="p-2 bg-blue-50 text-blue-600 rounded-xl transition-all" routerLink="/contact"><i class="fa-solid fa-phone"></i></button>

            </div>
            <div class="mt-auto">
                <button class="p-2 text-gray-300 hover:text-gray-600"><i class="fas fa-cog"></i></button>
            </div>
        </aside>
        <!-- Left Side -->
        <div class="bg-linear-to-b from-blue-500 to-indigo-600 text-white p-10 flex flex-col justify-between">

            <div>
                <h2 class="text-3xl font-extrabold mb-4">Contact Us</h2>
                <p class="text-sm opacity-80 mb-8">
                    Have questions or need help? Our team is always ready to assist you.
                </p>

                <div class="space-y-5">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-location-dot"></i>
                        <span class="text-sm">Mansoura, Egypt</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-phone"></i>
                        <span class="text-sm">+20 100 123 4567</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-envelope"></i>
                        <span class="text-sm">support@riva.com</span>
                    </div>
                </div>
            </div>

            <p class="text-xs opacity-70 mt-10">© 2026 Riva. All rights reserved.</p>
        </div>

        <!-- Right Side (Form) -->
        <div class="p-10">

            <h3 class="text-xl font-bold text-slate-800 mb-6">Send Message</h3>

            <form class="space-y-4">

                <div>
                    <label class="text-xs font-bold text-slate-500">Full Name</label>
                    <input type="text" class="w-full mt-1 p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Enter your name">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500">Email</label>
                    <input type="email" class="w-full mt-1 p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Enter your email">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500">Subject</label>
                    <input type="text" class="w-full mt-1 p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Enter subject">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500">Message</label>
                    <textarea rows="4" class="w-full mt-1 p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Write your message..."></textarea>
                </div>

                <button class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition">
          Send Message
        </button>

            </form>

        </div>

    </div>

</div>
