<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>

</head>

<body class="bg-gray-200 min-h-screen mt-10  flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-lg p-6 flex flex-col justify-between">


      <div class="">
        <h2 class="text-xl font-semibold">Good Evening</h2>
        <p class="text-gray-500">Mr. Ivan Norris</p>
      </div>
    <div class="bg-gray-200 rounded-2xl p-4 mb-20">
    

      <ul class="space-y-4 text-gray-600">

        <li class="flex items-center gap-3 hover:text-sky-500 cursor-pointer">
          Dashboard
        </li>

        <li class="flex items-center gap-3 hover:text-sky-500 cursor-pointer">
          Appointment
        </li>

        <li class="flex items-center gap-3 hover:text-sky-500 cursor-pointer">
          Reports
        </li>

        <li class="flex items-center gap-3 text-sky-500 font-semibold">
          My Profile
        </li>

        <li class="flex items-center gap-3 hover:text-sky-500 cursor-pointer">
          Clinic Overview
        </li>

      </ul>
    </div>

    <div class="bg-pink-100 p-4 rounded-xl text-center">
      <p class="text-sm text-gray-600">23,030 days</p>
      <button class="mt-3 bg-text-sky-500  text-white px-4 py-2 rounded-lg text-sm">
        Unlock Features
      </button>
    </div>

  </aside>


  <!-- Main Content -->
  <main class="flex-1 p-10">

    <!-- Header -->
    <div class="flex justify-between items-center mb-10">

     

      <div class="flex items-center gap-4">
        <input
          type="text"
          placeholder="Search..."
          class="px-4 py-2 rounded-lg border outline-none"
        />

        <div class="flex items-center gap-2">
          <img
            src="https://i.pravatar.cc/40"
            class="w-10 h-10 rounded-full"
          />
          <span class="text-gray-700 font-medium">Mr. Ivan Norris</span>
        </div>
      </div>

    </div>


    <!-- Page Title -->
    <h1 class="text-2xl font-bold mb-6">My Account</h1>


    <div class="grid grid-cols-4 gap-8">

      <!-- Settings Tabs -->
      <div class="bg-white p-6 rounded-xl shadow space-y-4">

        <button class="w-full bg-text-sky-500  text-white py-2 rounded-lg">
          Personal Information
        </button>

        <button class="w-full text-left text-gray-600 hover:text-text-sky-500 ">
          Integration Preferences
        </button>

        <button class="w-full text-left text-gray-600 hover:text-sky-500 ">
          Notification Settings
        </button>

        <button class="w-full text-left text-gray-600 hover:text-sky-500 ">
          Security Settings
        </button>

      </div>



      <!-- Profile Form -->
      <div class="col-span-3 bg-white p-8 rounded-xl shadow">

        <h2 class="text-lg font-semibold mb-6">Personal Information</h2>

        <!-- Profile Image -->
        <div class="flex items-center gap-4 mb-6">
          <img
            src="https://i.pravatar.cc/80"
            class="w-16 h-16 rounded-full"
          />

          <button class="bg-sky-500 text-white px-4 py-1 rounded-lg text-sm">
            Upload
          </button>

          <button class="border border-gray-300 px-4 py-1 rounded-lg text-sm">
            Remove
          </button>
        </div>


        <!-- Form -->
        <form class="grid grid-cols-2 gap-6">

          <div>
            <label class="text-sm text-gray-600">First Name</label>
            <input class="w-full border rounded-lg p-2 mt-1">
          </div>

          <div>
            <label class="text-sm text-gray-600">Last Name</label>
            <input class="w-full border rounded-lg p-2 mt-1">
          </div>

          <div>
            <label class="text-sm text-gray-600">Email</label>
            <input class="w-full border rounded-lg p-2 mt-1">
          </div>

          <div>
            <label class="text-sm text-gray-600">Username</label>
            <input class="w-full border rounded-lg p-2 mt-1">
          </div>

          <div>
            <label class="text-sm text-gray-600">Date of Birth</label>
            <input type="date" class="w-full border rounded-lg p-2 mt-1">
          </div>

          <div>
            <label class="text-sm text-gray-600">Phone Number</label>
            <input class="w-full border rounded-lg p-2 mt-1">
          </div>

          <div>
            <label class="text-sm text-gray-600">Country</label>
            <select class="w-full border rounded-lg p-2 mt-1">
              <option>Egypt</option>
              <option>USA</option>
              <option>Brazil</option>
            </select>
          </div>

          <div>
            <label class="text-sm text-gray-600">Address</label>
            <input class="w-full border rounded-lg p-2 mt-1">
          </div>

          <!-- Gender -->
          <div class="col-span-2">
            <label class="text-sm text-gray-600">Gender</label>

            <div class="flex gap-6 mt-2">
              <label class="flex items-center gap-2">
                <input type="radio" name="gender"> Male
              </label>

              <label class="flex items-center gap-2">
                <input type="radio" name="gender"> Female
              </label>

              <label class="flex items-center gap-2">
                <input type="radio" name="gender"> Intersex
              </label>
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="text-sm text-gray-600">New Password</label>
            <input type="password" class="w-full border rounded-lg p-2 mt-1">
          </div>

          <div>
            <label class="text-sm text-gray-600">Confirm Password</label>
            <input type="password" class="w-full border rounded-lg p-2 mt-1">
          </div>

          <!-- Buttons -->
          <div class="col-span-2 flex gap-4 mt-4">

            <button
              type="submit"
              class="bg-sky-500 text-white px-6 py-2 rounded-lg"
            >
              Submit
            </button>

            <button
              type="button"
              class="border border-gray-300 px-6 py-2 rounded-lg"
            >
              Cancel
            </button>

          </div>

        </form>

      </div>

    </div>

  </main>

</body>
</html>
