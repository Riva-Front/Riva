<div class="min-h-screen bg-[#F8F9FB] font-sans flex">

    <aside class="fixed left-0 top-0 h-screen w-20 bg-white border-r border-gray-200 hidden md:flex flex-col items-center py-6 gap-8 shadow-sm z-50">
        <div>
            <img src="/Picture1.png" routerLink="/dashboard-p" alt="RIVA Logo" class="w-12 hover:scale-105 transition-transform cursor-pointer">
        </div>
        <div class="flex flex-col gap-6 text-gray-400">
            <button class="p-2 hover:text-blue-600 transition-colors" routerLink="/dashboard-p">
                <i class="fas fa-home"></i>
            </button>
            <button class="p-2 hover:text-blue-600 transition-colors" routerLink="/add-new-medication">
                <i class="fas fa-pills"></i>
            </button>
            <button class="p-2 hover:text-blue-600 transition-colors" routerLink="/doctor-cards">
                <i class="fa-solid fa-user-doctor"></i>
            </button>
            <button class="p-2 hover:text-blue-600 transition-colors" routerLink="/chat">
                <i class="fa-brands fa-rocketchat"></i>
            </button>
            <button class="p-2 bg-blue-50 text-blue-600 rounded-lg" routerLink="/myprofile">
                <i class="fa-solid fa-circle-user"></i>
            </button>
        </div>
    </aside>

    <div class="flex-1 md:ml-20">

        <div *ngIf="isLoading" class="flex items-center justify-center min-h-screen">
            <div class="flex flex-col items-center gap-3">
                <svg class="animate-spin h-10 w-10 text-[#2D5BFF]" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                </svg>
                <p class="text-sm text-gray-400 font-medium">Loading profile...</p>
            </div>
        </div>

        <div *ngIf="!isLoading" class="max-w-3xl mx-auto px-4 py-10">

            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 mb-6 flex items-center gap-5 transition-all hover:shadow-md">
                <div class="relative w-20 h-20 shrink-0">
                    <img [src]="profileImageUrl" class="w-20 h-20 rounded-full object-cover border-4 border-blue-50 ring-1 ring-blue-100" alt="Profile">
                    <div class="absolute -bottom-1 -right-1 bg-[#2D5BFF] shadow-lg border-2 border-white p-2 rounded-full cursor-pointer hover:scale-110 transition-all" (click)="triggerFileInput()">
                        <i class="fa-solid fa-camera text-[10px] text-white"></i>
                    </div>
                    <input type="file" id="profilePhotoInput" accept="image/jpeg,image/png,image/gif,image/jpg" class="hidden" (change)="onFileSelected($event)">
                </div>

                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-3 flex-wrap">
                        <h1 class="text-xl font-extrabold text-[#1A2D51] tracking-tight truncate">{{ fullName }}</h1>
                        <span class="text-[10px] uppercase tracking-widest font-black px-3 py-1 rounded-full shrink-0" [ngClass]="isDoctor ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-blue-100 text-blue-700 border border-blue-200'">
                            {{ isDoctor ? 'Doctor' : 'Patient' }}
                        </span>
                    </div>
                    <p class="text-sm text-gray-500 font-medium mt-0.5">{{ accountForm.get('email')?.value }}</p>
                </div>

                <button type="button" (click)="clearImage()" *ngIf="profileImageUrl && !profileImageUrl.includes('ui-avatars')" class="text-[11px] font-bold text-red-500 hover:bg-red-50 border border-red-100 px-4 py-2 rounded-2xl transition-all shrink-0">
                    Remove
                </button>
            </div>

            <div class="flex gap-2 mb-8 bg-gray-100/50 p-1.5 rounded-2xl w-fit">
                <ng-container *ngIf="isPatient">
                    <button type="button" (click)="setTab('personal')" class="px-6 py-2.5 rounded-xl text-[13px] font-bold transition-all flex items-center gap-2" [ngClass]="activeTab === 'personal' ? 'bg-white text-[#2D5BFF] shadow-sm ring-1 ring-gray-200' : 'text-gray-500 hover:bg-gray-200/50'">
                        <i class="fa-solid fa-user-gear text-xs"></i> Personal
                    </button>
                    <button type="button" (click)="setTab('medical')" class="px-6 py-2.5 rounded-xl text-[13px] font-bold transition-all flex items-center gap-2" [ngClass]="activeTab === 'medical' ? 'bg-white text-[#2D5BFF] shadow-sm ring-1 ring-gray-200' : 'text-gray-500 hover:bg-gray-200/50'">
                        <i class="fa-solid fa-stethoscopes text-xs"></i> Medical
                    </button>
                </ng-container>
            </div>

            <div *ngIf="errorMessage" class="mb-4 px-5 py-4 bg-red-50 border-l-4 border-red-400 rounded-r-2xl text-sm text-red-700 font-medium animate-in fade-in slide-in-from-top-2">{{ errorMessage }}</div>
            <div *ngIf="successMessage" class="mb-4 px-5 py-4 bg-green-50 border-l-4 border-green-400 rounded-r-2xl text-sm text-green-700 font-medium animate-in fade-in slide-in-from-top-2">{{ successMessage }}</div>

            <form [formGroup]="accountForm" (ngSubmit)="onSave()">

                <div *ngIf="activeTab === 'personal'" class="bg-white rounded-[32px] shadow-sm border border-gray-100 p-8 space-y-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-black text-[#1A2D51] uppercase tracking-widest">General Information</h3>
                        <div class="h-1 w-12 bg-blue-100 rounded-full"></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-gray-400 uppercase ml-1">First Name</label>
                            <input formControlName="firstName" type="text" class="w-full px-5 py-4 bg-[#F9FAFB] border border-gray-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-300 outline-none transition-all text-[14px] font-semibold text-gray-700">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-gray-400 uppercase ml-1">Last Name</label>
                            <input formControlName="lastName" type="text" class="w-full px-5 py-4 bg-[#F9FAFB] border border-gray-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-300 outline-none transition-all text-[14px] font-semibold text-gray-700">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-gray-400 uppercase ml-1">Contact Email</label>
                        <input formControlName="email" type="email" class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-[14px] font-medium text-gray-400 cursor-not-allowed" readonly>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-gray-400 uppercase ml-1">Phone Number</label>
                            <input formControlName="phone" type="text" class="w-full px-5 py-4 bg-[#F9FAFB] border border-gray-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-300 outline-none transition-all text-[14px] font-semibold text-gray-700">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-gray-400 uppercase ml-1">Gender</label>
                            <div class="relative">
                                <select formControlName="gender" class="w-full px-5 py-4 bg-[#F9FAFB] border border-gray-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-300 outline-none transition-all text-[14px] font-semibold text-gray-700 appearance-none cursor-pointer">
                                    <option value="">Choose Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                                <i class="fa-solid fa-caret-down absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-gray-400 uppercase ml-1">Current Age</label>
                            <input formControlName="age" type="number" class="w-full px-5 py-4 bg-[#F9FAFB] border border-gray-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-300 outline-none transition-all text-[14px] font-semibold text-gray-700">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-gray-400 uppercase ml-1">Country</label>
                            <div class="relative">
                                <select formControlName="country" class="w-full px-5 py-4 bg-[#F9FAFB] border border-gray-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-300 outline-none transition-all text-[14px] font-semibold text-gray-700 appearance-none cursor-pointer">
                                    <option value="Egypt">Egypt</option>
                                    <option value="Saudi Arabia">Saudi Arabia</option>
                                    <option value="UAE">UAE</option>
                                </select>
                                <i class="fa-solid fa-earth-africa absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-gray-400 uppercase ml-1">Home Address</label>
                        <input formControlName="address" type="text" class="w-full px-5 py-4 bg-[#F9FAFB] border border-gray-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-300 outline-none transition-all text-[14px] font-semibold text-gray-700">
                    </div>

                    <button type="submit" [disabled]="isSaving" class="w-full bg-[#2D5BFF] text-white py-4 rounded-[20px] font-bold text-sm shadow-xl shadow-blue-100 hover:bg-[#1A4BFF] hover:-translate-y-0.5 transition-all disabled:opacity-60 flex items-center justify-center gap-3 active:scale-95">
                        <i *ngIf="!isSaving" class="fa-solid fa-check-circle"></i>
                        <svg *ngIf="isSaving" class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                        </svg>
                        {{ isSaving ? 'Saving Profile...' : 'Update Personal Information' }}
                    </button>
                </div>

                <div *ngIf="activeTab === 'medical' && isPatient" class="bg-white rounded-[32px] shadow-sm border border-gray-100 p-8 space-y-8 animate-in fade-in duration-500">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-500">
                            <i class="fa-solid fa-heart-pulse text-lg"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-black text-[#1A2D51] uppercase tracking-widest leading-tight">Medical Records</h3>
                            <p class="text-xs text-gray-400 font-medium">Keep your health data updated for better diagnosis</p>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-gray-400 uppercase ml-1">Chronic Conditions</label>
                        <div class="relative group">
                            <input type="checkbox" id="medical-dropdown" class="peer hidden">
                            <label for="medical-dropdown" class="w-full px-6 py-4 bg-[#F9FAFB] border border-gray-200 rounded-2xl text-[14px] font-semibold text-gray-700 flex items-center justify-between cursor-pointer group-hover:border-blue-200 transition-all">
                                <span>{{ selectedConditionsText || 'Select Conditions' }}</span>
                                <i class="fa-solid fa-plus-circle text-blue-500 transition-transform peer-checked:rotate-45"></i>
                            </label>

                            <div class="absolute z-50 w-full mt-3 bg-white border border-gray-100 rounded-2xl shadow-2xl opacity-0 invisible translate-y-2 peer-checked:opacity-100 peer-checked:visible peer-checked:translate-y-0 transition-all duration-300 p-3 space-y-1">
                                <label class="flex items-center justify-between p-4 hover:bg-blue-50 rounded-xl cursor-pointer transition-colors group/item">
                                    <div class="flex items-center gap-3">
                                        <div class="w-2 h-2 rounded-full bg-blue-400"></div>
                                        <span class="text-[14px] font-bold text-gray-700">Diabetes</span>
                                    </div>
                                    <input type="checkbox" [(ngModel)]="conditions.diabetes" [ngModelOptions]="{standalone:true}" class="w-5 h-5 rounded-lg border-gray-300 text-blue-600 focus:ring-blue-500">
                                </label>
                                <label class="flex items-center justify-between p-4 hover:bg-blue-50 rounded-xl cursor-pointer transition-colors group/item">
                                    <div class="flex items-center gap-3">
                                        <div class="w-2 h-2 rounded-full bg-red-400"></div>
                                        <span class="text-[14px] font-bold text-gray-700">Hypertension</span>
                                    </div>
                                    <input type="checkbox" [(ngModel)]="conditions.hypertension" [ngModelOptions]="{standalone:true}" class="w-5 h-5 rounded-lg border-gray-300 text-blue-600 focus:ring-blue-500">
                                </label>
                                <label class="flex items-center justify-between p-4 hover:bg-blue-50 rounded-xl cursor-pointer transition-colors group/item">
                                    <div class="flex items-center gap-3">
                                        <div class="w-2 h-2 rounded-full bg-purple-400"></div>
                                        <span class="text-[14px] font-bold text-gray-700">Cancer</span>
                                    </div>
                                    <input type="checkbox" [(ngModel)]="conditions.cancer" [ngModelOptions]="{standalone:true}" class="w-5 h-5 rounded-lg border-gray-300 text-blue-600 focus:ring-blue-500">
                                </label>
                                <div class="pt-2 mt-2 border-t border-gray-50 flex justify-center">
                                    <label for="medical-dropdown" class="text-[11px] font-black text-blue-600 uppercase py-2 px-4 cursor-pointer hover:bg-blue-50 rounded-lg">Apply Changes</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div *ngIf="selectedConditions.length > 0" class="flex flex-wrap gap-2 pt-2">
                        <span *ngFor="let c of selectedConditions" class="flex items-center gap-3 px-4 py-2 bg-blue-50 text-blue-700 rounded-full text-[12px] font-black border border-blue-100 hover:bg-blue-100 transition-colors">
                            {{ c }}
                            <button type="button" (click)="removeCondition(c)" class="text-blue-300 hover:text-red-500 transition-colors">
                                <i class="fa-solid fa-circle-xmark"></i>
                            </button>
                        </span>
                    </div>



                    <button type="button" (click)="onSave()" [disabled]="isSaving" class="w-full bg-[#2D5BFF] text-white py-4 rounded-[20px] font-bold text-sm shadow-xl shadow-blue-100 hover:bg-[#1A4BFF] transition-all disabled:opacity-60 flex items-center justify-center gap-2 active:scale-95 mt-4">
                        {{ isSaving ? 'Saving Records...' : 'Save Medical History' }}
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
