<div class="flex flex-col lg:flex-row min-h-screen bg-white font-sans text-slate-800">

    <!-- left-section -->
    <div class="relative flex-1 min-h-[250px] lg:min-h-screen overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-[#DDEBFF] to-[#BFD6FF]"></div>
        <div class="absolute top-16 left-20 bg-white/60 backdrop-blur-md p-3 rounded-2xl shadow-md">
            <i class="fa-solid fa-bell text-[green] text-xl"></i>
        </div>
        <div class="absolute top-1/3 right-20 bg-white/60 backdrop-blur-md p-3 rounded-2xl shadow-md">
            <i class="fa-solid fa-heart text-[#2D5BFF] text-xl"></i>
        </div>
        <div class="absolute bottom-32 left-32 bg-white/60 backdrop-blur-md p-3 rounded-2xl shadow-md">
            <i class="fa-solid fa-stethoscope text-[orange] text-xl"></i>
        </div>
        <div class="relative z-10 flex flex-col items-center justify-center w-full h-full p-10">
            <spline-viewer url="https://prod.spline.design/xxxxx/scene.splinecode"></spline-viewer>

            <div class="text-center mt-10">
                <h2 class="text-[#1A4BFF] text-3xl font-bold">Welcome to Riva</h2>
                <p class="text-[#4A6FAF] text-sm mt-3">Your trusted healthcare companion</p>
            </div>
        </div>
    </div>

    <!-- right-section -->
    <div class="flex-1 flex flex-col justify-center px-8 py-12 lg:px-20 overflow-y-auto">
        <div class="max-w-md w-full mx-auto">
            <h2 class="text-2xl font-bold text-slate-900 mb-8">Pay With Card</h2>

            <div *ngIf="successMessage" class="mb-4 px-4 py-3 bg-green-50 border border-green-100 rounded-2xl text-sm text-green-600 font-medium">
                {{ successMessage }}
            </div>
            <div *ngIf="errorMessage" class="mb-4 px-4 py-3 bg-red-50 border border-red-100 rounded-2xl text-sm text-red-600 font-medium">
                {{ errorMessage }}
            </div>

            <form [formGroup]="paymentForm" (ngSubmit)="onSubmit()" class="space-y-5">

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Email</label>
                    <input type="email" formControlName="email" placeholder="example@gmail.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Name on card</label>
                    <select formControlName="cardHolder" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none appearance-none bg-white">
                        <option value="John Smith">John Smith</option>
                        <option value="Jane Doe">Jane Doe</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Card Details</label>
                    <div class="relative mb-3">
                        <input type="text" (input)="formatCardNumber($event)" formControlName="cardNumber" placeholder="1234 1234 1234 1234" class="w-full px-4 py-3 pr-20 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2">
                            <span class="text-[9px] font-bold bg-[#1a1f71] text-white px-1.5 py-0.5 rounded">VISA</span>
                            <div class="flex -space-x-2">
                                <div class="w-4 h-4 rounded-full bg-red-500"></div>
                                <div class="w-4 h-4 rounded-full bg-yellow-500 opacity-80"></div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" (input)="formatExpiry($event)" formControlName="expiry" placeholder="MM/YY" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
                        <input type="text" formControlName="cvc" placeholder="CVC" maxlength="4" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Billing address</label>
                    <select formControlName="country" class="w-full px-4 py-3 rounded-t-xl border border-slate-200 border-b-0 focus:border-blue-500 outline-none">
                        <option *ngFor="let c of countries" [value]="c">{{ c }}</option>
                    </select>
                    <input type="text" formControlName="address" placeholder="Address" class="w-full px-4 py-3 rounded-b-xl border border-slate-200 focus:border-blue-500 outline-none">
                </div>

                <div class="flex items-start gap-3 py-2">
                    <input type="checkbox" formControlName="saveInfo" id="save" class="mt-1 w-4 h-4 accent-blue-500 cursor-pointer">
                    <label for="save" class="text-sm text-slate-600 leading-tight cursor-pointer">
                        Securely save my information for 1-click checkout
                        <span class="block text-[11px] text-slate-400 mt-1">Pay faster on Dolens and everywhere Link is accepted</span>
                    </label>
                </div>

                <!-- ✅ شيلنا !paymentForm.valid من الـ disabled -->
                <button type="submit" [disabled]="isLoading" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-semibold py-4 rounded-xl shadow-lg shadow-blue-500/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <svg *ngIf="isLoading" class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                    </svg>
                    {{ isLoading ? 'Processing...' : 'Subscribe' }}
                </button>

                <p class="text-[11px] text-slate-400 text-center leading-relaxed">
                    By confirming your subscription, you allow us to charge your card for this and future payments in accordance with terms.
                </p>

            </form>
        </div>
    </div>

</div>
