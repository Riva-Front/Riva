<!-- Main Layout -->
<div class="min-h-screen w-full bg-[#F8F9FB] font-sans flex overflow-hidden">

    <!-- Left Section -->
    <div class="hidden md:flex w-1/2 relative overflow-hidden bg-gradient-to-br from-[#E6F0FF] to-[#D1E4FF]">
        <div class="absolute top-10 left-10 flex flex-col items-center z-30">
            <img src="/Picture1.png" class="w-24 h-24 object-contain" alt="RIVA Logo">
        </div>
        <div class="absolute top-1/4 right-20 bg-white/70 backdrop-blur-md p-3 rounded-2xl shadow-sm z-20">
            <i class="fa-solid fa-user-doctor text-green-500 text-xl"></i>
        </div>
        <div class="relative z-10 flex flex-col items-center justify-center w-full h-full pt-20">
            <div class="w-full h-[45%] relative">
                <div class="w-full h-[115%] absolute -bottom-[10%] flex items-center justify-center scale-125">
                    <spline-viewer url="https://prod.spline.design/RfqAjOnSviCEEX3U/scene.splinecode" class="w-full h-full"></spline-viewer>
                </div>
            </div>
            <div class="mt-10 bg-white/90 backdrop-blur-sm px-8 py-5 rounded-[2.5rem] shadow-xl border border-white/50 max-w-sm text-center">
                <p class="text-[#1A2D51] text-sm font-semibold leading-relaxed">
                    Welcome to Safia Care! Let's get you registered in just a few steps
                </p>
            </div>
            <div class="flex gap-2 mt-8">
                <div class="w-2 h-2 rounded-full bg-gray-300"></div>
                <div class="w-2 h-2 rounded-full bg-gray-300"></div>
                <div class="w-2 h-2 rounded-full bg-blue-500 w-6 transition-all"></div>
            </div>
        </div>
    </div>

    <!-- Right Section -->
    <div class="w-full md:w-1/2 flex flex-col bg-white p-8 md:px-12 lg:px-24 justify-start overflow-y-auto">
        <div class="w-full max-w-[500px] mx-auto py-10">

            <h2 class="text-xl font-bold text-[#1A2D51] mb-8">Profile Account</h2>

            <!-- Success Message -->
            <div *ngIf="successMessage" class="mb-4 px-4 py-3 bg-green-50 border border-green-200 text-green-700 rounded-2xl text-sm">
                {{ successMessage }}
            </div>

            <!-- Error Message -->
            <div *ngIf="errorMessage" class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-600 rounded-2xl text-sm">
                {{ errorMessage }}
            </div>

            <!-- Form -->
            <form (ngSubmit)="onSubmit()" class="space-y-6">

                <!-- Profile Image Upload -->
                <div class="flex items-center gap-6 mb-8">

                    <!-- Avatar with X button -->
                    <div class="relative w-20 h-20">

                        <img [src]="profileImageUrl" class="w-20 h-20 rounded-full object-cover border-2 border-blue-100" alt="Profile">

                        <!-- X Button — يظهر بس لو فيه صورة مرفوعة -->
                        <button *ngIf="hasCustomImage" type="button" (click)="clearImage()" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-md transition-all z-10">
              <i class="fa-solid fa-xmark text-[9px]"></i>
            </button>

                        <!-- Camera Icon -->
                        <div class="absolute -bottom-1 -right-1 bg-white shadow-sm border border-gray-100 p-1.5 rounded-full cursor-pointer hover:bg-gray-50 transition-all" (click)="triggerFileInput()">
                            <i class="fa-solid fa-camera text-[10px] text-gray-500"></i>
                        </div>

                    </div>

                    <!-- Upload Info -->
                    <div>
                        <p class="text-[13px] font-bold text-gray-700">Profile Photo</p>

                        <input type="file" id="profilePhotoInput" accept="image/jpeg, image/png, image/gif" class="hidden" (change)="onFileSelected($event)">

                        <button type="button" class="mt-1 px-4 py-1.5 border border-gray-200 rounded-lg text-[11px] font-bold text-gray-600 hover:bg-gray-50 flex items-center gap-2 transition-all" (click)="triggerFileInput()">
              <i class="fa-solid fa-upload"></i>
              Upload New Photo
            </button>

                        <p class="text-[10px] text-gray-400 mt-1">JPG, GIF or PNG. Max size of 2MB.</p>
                    </div>

                </div>

                <!-- Hourly Fee — مربوط بـ ngModel -->
                <div class="space-y-2">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">Hourly Fee ($)</label>
                    <input type="number" [(ngModel)]="hourlyFee" name="hourlyFee" placeholder="Enter your hourly rate" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm">
                </div>

                <!-- Gender — مربوط بـ ngModel -->
                <div class="space-y-2">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">Gender</label>
                    <select [(ngModel)]="gender" name="gender" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm appearance-none cursor-pointer">
            <option value="" disabled>Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
                </div>

                <!-- Description — مربوط بـ ngModel -->
                <div class="space-y-2">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">About Description</label>
                    <textarea rows="4" [(ngModel)]="description" name="description" placeholder="Tell us about your caregiving philosophy, specialties, and personality..." class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm resize-none">
          </textarea>
                </div>

                <!-- Buttons -->
                <div class="flex gap-4 pt-4">
                    <button type="button" class="w-1/3 bg-black text-white py-4 rounded-2xl font-bold text-sm hover:opacity-90 transition-all">
            Back
          </button>

                    <button type="submit" [disabled]="isLoading" class="w-2/3 bg-[#2D5BFF] text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-100 hover:bg-[#1A4BFF] transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">

            <!-- Spinner لما يكون Loading -->
            <svg *ngIf="isLoading" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>

            {{ isLoading ? 'Saving...' : 'Continue' }}
          </button>
                </div>

            </form>
        </div>
    </div>

</div>
