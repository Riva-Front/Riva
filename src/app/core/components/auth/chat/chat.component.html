<div class="flex h-screen bg-[#F8FAFC] font-sans text-slate-800 overflow-hidden relative">

    <!-- Sidebar Desktop -->
    <aside class="fixed left-0 top-0 h-screen w-20 bg-white border-r border-gray-200 hidden md:flex flex-col items-center py-6 gap-8 shadow-sm z-50">
        <div class="text-blue-600 font-bold text-xl">
            <img src="/Picture1.png" routerLink="/dashboard-p" alt="RIVA Logo" class="w-12">
        </div>
        <div class="flex flex-col gap-6 text-gray-400">
            <button class="p-2 hover:text-blue-600" routerLink="/dashboard-p"><i class="fas fa-home"></i></button>
            <button class="p-2 hover:text-blue-600" routerLink="/add-new-medication"><i class="fas fa-pills"></i></button>
            <button class="p-2 hover:text-blue-600" routerLink="/doctor-cards"><i class="fa-solid fa-user-doctor"></i></button>
            <button class="p-2 bg-blue-50 text-blue-600 rounded-lg" routerLink="/chat"><i class="fa-brands fa-rocketchat"></i></button>
        </div>
        <div class="mt-auto">
            <button class="p-2 text-gray-400 hover:text-gray-600"><i class="fas fa-cog"></i></button>
        </div>
    </aside>

    <!-- Bottom Nav Mobile -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center py-3 z-[100] px-4 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
        <button class="p-2 text-gray-400" routerLink="/dashboard-p"><i class="fas fa-home text-lg"></i></button>
        <button class="p-2 text-gray-400" routerLink="/add-new-medication"><i class="fas fa-pills text-lg"></i></button>
        <div class="relative">
            <button class="p-2 bg-blue-500 text-white rounded-2xl w-12 h-12 -mt-8 flex items-center justify-center border-4 border-[#F8FAFC] shadow-lg" routerLink="/chat">
                <i class="fa-brands fa-rocketchat text-lg"></i>
            </button>
        </div>
        <button class="p-2 text-gray-400" routerLink="/doctor-cards"><i class="fa-solid fa-user-doctor text-lg"></i></button>
        <button class="p-2 text-gray-400"><i class="fas fa-cog text-lg"></i></button>
    </nav>

    <!-- Main Content -->
    <div class="flex flex-1 md:ml-20 md:p-4 gap-4 overflow-hidden h-[calc(100vh-64px)] md:h-screen pt-0 pb-0">

        <!-- Messages List Sidebar (Desktop only) -->
        <main class="hidden lg:flex w-80 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 flex-col overflow-hidden">
            <div class="p-6 h-full flex flex-col">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h2 class="text-xl font-extrabold text-slate-800">Messages</h2>
                    <button class="w-8 h-8 bg-blue-500 text-white rounded-xl flex items-center justify-center shadow-lg">+</button>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 pr-2 scrollbar-thin scrollbar-thumb-slate-200">
                    <div class="flex items-center gap-4 p-4 bg-blue-50/60 rounded-[2rem] border border-blue-100 cursor-pointer">
                        <img src="https://i.pravatar.cc/150?u=sarah" class="w-12 h-12 rounded-full border-2 border-white">
                        <div class="flex-1 min-w-0 font-bold text-[13px] text-slate-800 truncate">Dr. Sarah Mitchell</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Chat Section -->
        <section class="flex-1 min-w-0 bg-white rounded-none md:rounded-[2.5rem] shadow-sm border-0 md:border border-slate-100 flex flex-col overflow-hidden h-full">

            <!-- Chat Header -->
            <header class="shrink-0 p-4 md:p-5 border-b border-slate-100 flex justify-between items-center bg-white z-30">
                <div class="flex items-center gap-3">
                    <button class="lg:hidden text-slate-400 p-1" routerLink="/doctor-cards">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <div class="relative">
                        <img src="https://i.pravatar.cc/150?u=sarah" class="w-10 h-10 md:w-11 md:h-11 rounded-full border border-slate-100 shadow-sm">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800 text-[13px] md:text-base">Dr. Sarah Mitchell</h3>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Cardiology</p>
                    </div>
                </div>
                <div class="flex gap-1">
                    <button class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-blue-600 transition-all">
                        <i class="fa-solid fa-phone"></i>
                    </button>
                    <button class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-blue-600 transition-all">
                        <i class="fa-solid fa-video"></i>
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <div #messagesContainer class="flex-1 min-h-0 overflow-y-auto p-4 md:p-8 space-y-6 bg-[#fafcfe] scroll-smooth">

                <!-- Tip Banner -->
                <div *ngIf="showTip" class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-[1.8rem] p-4 text-white flex items-center gap-4 shadow-xl shrink-0">
                    <div class="text-[11px] leading-relaxed flex-1">
                        <span class="font-black block text-[12px] mb-1">Riva Assistant</span> Tip: You can send a voice message if typing is difficult.
                    </div>
                    <button class="opacity-70" (click)="showTip = false"><i class="fa-solid fa-xmark text-sm"></i></button>
                </div>

                <!-- Loading Skeleton -->
                <div *ngIf="isLoading" class="flex flex-col gap-4">
                    <div class="flex gap-3 max-w-[75%]">
                        <div class="w-8 h-8 rounded-full bg-slate-200 animate-pulse shrink-0"></div>
                        <div class="bg-slate-100 rounded-[1.5rem] rounded-bl-none h-14 w-56 animate-pulse"></div>
                    </div>
                    <div class="flex gap-3 max-w-[75%] ml-auto flex-row-reverse">
                        <div class="bg-blue-100 rounded-[1.5rem] rounded-br-none h-14 w-40 animate-pulse"></div>
                    </div>
                    <div class="flex gap-3 max-w-[75%]">
                        <div class="w-8 h-8 rounded-full bg-slate-200 animate-pulse shrink-0"></div>
                        <div class="bg-slate-100 rounded-[1.5rem] rounded-bl-none h-10 w-44 animate-pulse"></div>
                    </div>
                </div>

                <!-- Messages -->
                <ng-container *ngIf="!isLoading">
                    <ng-container *ngFor="let msg of messages">

                        <!-- Incoming (patient) — white bubble, left side -->
                        <!-- <div *ngIf="msg.sender === 'patient'" class="flex gap-3 max-w-[85%] md:max-w-[75%]">
                            <img src="https://i.pravatar.cc/150?u=sarah" class="w-8 h-8 rounded-full self-end shadow-sm shrink-0">
                            <div class="bg-white p-4 rounded-[1.5rem] rounded-bl-none border border-slate-100 shadow-sm min-w-0">
                                <p class="text-sm text-slate-700 font-medium">{{ msg.content }}</p>
                                <span class="text-[9px] font-bold text-slate-400 mt-2 block uppercase">{{ formatTime(msg.timestamp) }}</span>
                            </div>
                        </div> -->

                        <!-- Outgoing (doctor) — blue bubble, right side -->
                        <!-- patient → يمين أزرق -->
                        <div *ngIf="msg.sender === 'patient'" class="flex gap-3 max-w-[85%] md:max-w-[75%] ml-auto flex-row-reverse">
                            <div class="bg-gradient-to-br from-blue-600 to-indigo-600 p-4 rounded-[1.5rem] rounded-br-none text-white shadow-lg min-w-0">
                                <p class="text-sm font-medium">{{ msg.content }}</p>
                                <span class="text-[9px] text-blue-100 font-bold mt-2 block text-right uppercase">{{ formatTime(msg.timestamp) }}</span>
                            </div>
                        </div>

                        <!-- doctor → شمال أبيض -->
                        <div *ngIf="msg.sender === 'doctor'" class="flex gap-3 max-w-[85%] md:max-w-[75%]">
                            <img src="https://i.pravatar.cc/150?u=sarah" class="w-8 h-8 rounded-full self-end shadow-sm shrink-0">
                            <div class="bg-white p-4 rounded-[1.5rem] rounded-bl-none border border-slate-100 shadow-sm min-w-0">
                                <p class="text-sm text-slate-700 font-medium">{{ msg.content }}</p>
                                <span class="text-[9px] font-bold text-slate-400 mt-2 block uppercase">{{ formatTime(msg.timestamp) }}</span>
                            </div>
                        </div>

                    </ng-container>

                    <!-- Empty State -->
                    <div *ngIf="messages.length === 0" class="flex flex-col items-center justify-center h-full text-center py-16">
                        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                            <i class="fa-brands fa-rocketchat text-blue-400 text-2xl"></i>
                        </div>
                        <p class="text-slate-400 font-medium text-sm">No messages yet</p>
                        <p class="text-slate-300 text-xs mt-1">Start the conversation!</p>
                    </div>
                </ng-container>

            </div>

            <!-- Footer / Input -->
            <footer class="shrink-0 p-3 md:p-5 bg-white border-t border-slate-100 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
                <div class="bg-slate-50 rounded-full md:rounded-[1.8rem] p-1.5 md:p-2 flex items-center gap-1 border border-slate-100 focus-within:ring-2 focus-within:ring-blue-400 focus-within:bg-white transition-all shadow-sm">
                    <button class="w-9 h-9 text-slate-400 hover:text-blue-500 flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    <input type="text" [(ngModel)]="newMessage" (keydown)="onKeyDown($event)" placeholder="Type your message..." [disabled]="isSending" class="flex-1 min-w-0 bg-transparent border-none focus:ring-0 text-[13px] py-2 px-2 outline-none font-medium text-slate-700 disabled:opacity-50">
                    <button class="w-9 h-9 text-slate-400 hover:text-blue-500 flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <button (click)="sendMessage()" [disabled]="!newMessage.trim() || isSending" class="w-10 h-10 md:w-12 md:h-12 bg-blue-600 text-white rounded-full md:rounded-[1.2rem] shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i *ngIf="!isSending" class="fa-solid fa-paper-plane text-xs md:text-sm"></i>
                        <i *ngIf="isSending" class="fa-solid fa-spinner fa-spin text-xs md:text-sm"></i>
                    </button>
                </div>
            </footer>

        </section>
    </div>
</div>
