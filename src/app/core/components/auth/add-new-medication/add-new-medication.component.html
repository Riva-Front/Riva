<div class="min-h-screen bg-[#F8FAFC] font-sans md:pl-20 pb-24 md:pb-8" dir="ltr">

    <!-- ===================== SIDEBAR للشاشات الكبيرة ===================== -->
    <aside class="fixed left-0 top-0 h-screen w-20 bg-white border-r border-gray-200 hidden md:flex flex-col items-center py-6 gap-8 shadow-sm z-50">
        <!-- شعار الموقع -->
        <div class="text-blue-600 font-bold text-xl">
            <img src="/Picture1.png" routerLink="/dashboard-p" alt="RIVA Logo" class="w-12">
        </div>

        <!-- أيقونات التنقل الرئيسية -->
        <div class="flex flex-col gap-6 text-gray-400">
            <button class="p-2 hover:text-blue-600 transition-colors" routerLink="/dashboard-p"><i class="fas fa-home"></i></button>
            <button class="p-2 bg-blue-50 text-blue-600 rounded-lg" routerLink="/add-new-medication"><i class="fas fa-pills"></i></button>
            <button class="p-2 hover:text-blue-600 transition-colors" routerLink="/doctor-cards"><i class="fa-solid fa-user-doctor"></i></button>
            <button class="p-2 hover:text-blue-600" routerLink="/chat"><i class="fa-brands fa-rocketchat"></i></button>

        </div>

        <!-- أيقونة الإعدادات أسفل الشريط -->
        <div class="mt-auto">
            <button class="p-2 text-gray-400 hover:text-gray-600 transition-colors"><i class="fas fa-cog"></i></button>
        </div>
    </aside>

    <!-- ===================== BOTTOM NAVIGATION للشاشات الصغيرة ===================== -->
    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around items-center py-3 z-50 md:hidden shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <!-- أيقونات التنقل للشاشات الصغيرة -->
        <button class="flex flex-col items-center gap-1 text-gray-400" routerLink="/dashboard-p">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-blue-600" routerLink="/add-new-medication">
            <i class="fas fa-pills text-lg"></i>
            <span class="text-[10px] font-bold">Meds</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400" routerLink="/doctor-cards">
            <i class="fa-solid fa-user-doctor text-lg"></i>
            <span class="text-[10px] font-bold">Doctors</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400" routerLink="/chat"><i class="fa-brands fa-rocketchat "></i>
            <span class="text-[10px] font-bold ">Chat</span>
        </button>
    </nav>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="p-6 md:p-12 max-w-[1400px] mx-auto ">

        <!-- ===================== HEADER: Title + Save Button ===================== -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 md:mb-12 ">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight ">
                    Add New <span class="text-blue-600 ">Medication</span>
                </h1>
                <p class="text-slate-400 text-xs md:text-sm mt-1 font-medium italic ">Keep your treatment plan organized and up to date.</p>
            </div>

            <!-- زر الحفظ -->
            <button class="w-full md:w-auto bg-[#0052FF] hover:bg-blue-700 text-white px-10 py-4 rounded-2xl text-sm font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-100 active:scale-95 ">
                Save Changes
            </button>
        </div>

        <!-- ===================== FORM: Add Medication ===================== -->
        <div class="bg-white rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.02)] border border-gray-50 mb-10 ">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10 ">

                <!-- Medicine Name -->
                <div class="flex flex-col gap-2.5 ">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 ">Medicine Name</label>
                    <input type="text " placeholder="e.g. Donepezil " class="w-full border-none rounded-xl md:rounded-2xl p-4 bg-slate-50/80 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-300 text-slate-700 font-semibold ">
                </div>

                <!-- Dosage Details -->
                <div class="flex flex-col gap-2.5 ">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 ">Dosage Details</label>
                    <input type="text " placeholder="e.g. 10mg, 1 Pill " class="w-full border-none rounded-xl md:rounded-2xl p-4 bg-slate-50/80 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-300 text-slate-700
            font-semibold ">
                </div>

                <!-- Reminder Time -->
                <div class="flex flex-col gap-2.5 ">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 ">Reminder Time</label>
                    <input type="time " class="w-full border-none rounded-xl md:rounded-2xl p-4 bg-slate-50/80 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-slate-700 font-semibold ">
                </div>

                <!-- Frequency -->
                <div class="flex flex-col gap-2.5 ">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 ">Frequency</label>
                    <select class="w-full border-none rounded-xl md:rounded-2xl p-4 bg-slate-50/80 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-slate-700 font-semibold cursor-pointer appearance-none ">
                        <option>Once Daily</option>
                        <option>Twice Daily</option>
                        <option>Weekly</option>
                    </select>
                </div>

                <!-- Special Instructions -->
                <div class="flex flex-col gap-2.5 md:col-span-2 ">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 ">Special Instructions</label>
                    <textarea rows="3 " placeholder="e.g. Take after dinner with a glass of water " class="w-full border-none rounded-xl md:rounded-2xl p-4 bg-slate-50/80 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-300
            text-slate-700 font-semibold "></textarea>
                </div>

            </div>
        </div>

        <!-- ===================== ACTIVE MEDICATIONS SECTION ===================== -->
        <div class="space-y-6 ">

            <!-- Section Title -->
            <div class="flex items-center gap-3 px-2 ">
                <div class="w-1.5 h-6 md:w-2 md:h-8 bg-[#00D1B2] rounded-full "></div>
                <h2 class="text-xl md:text-2xl font-black text-slate-800 tracking-tight ">Active Medications</h2>
            </div>

            <!-- ===================== MEDICATION TABLE (DESKTOP) ===================== -->
            <div class="hidden md:block bg-white rounded-[2.5rem] shadow-sm border border-gray-50 overflow-hidden ">
                <table class="w-full text-left ">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-gray-50 ">
                            <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest ">Medication & Dosage</th>
                            <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest ">Next Dose</th>
                            <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest ">Frequency</th>
                            <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right ">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50 ">
                        <tr class="hover:bg-slate-50/30 transition-all group ">
                            <td class="px-8 py-7 ">
                                <div class="font-bold text-slate-800 text-base ">Donepezil</div>
                                <div class="text-xs text-slate-400 font-semibold mt-0.5 ">10mg • Oral Tablet</div>
                            </td>
                            <td class="px-8 py-7 ">
                                <span class="bg-blue-50 text-[#0052FF] px-4 py-2 rounded-xl text-xs font-black ">09:00 AM Today</span>
                            </td>
                            <td class="px-8 py-7 ">
                                <span class="text-sm text-slate-600 font-bold ">Daily</span>
                            </td>
                            <td class="px-8 py-7 text-right ">
                                <div class="flex justify-end gap-2 md:opacity-0 group-hover:opacity-100 transition-opacity ">
                                    <button class="p-2.5 text-slate-400 hover:text-blue-600 rounded-xl "><i class="fas fa-edit "></i></button>
                                    <button class="p-2.5 text-slate-400 hover:text-red-500 rounded-xl "><i class="fas fa-trash "></i></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- ===================== MEDICATION CARDS (MOBILE) ===================== -->
            <div class="md:hidden space-y-4 ">
                <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm space-y-4 ">
                    <div class="flex justify-between items-start ">
                        <div>
                            <h3 class="font-bold text-slate-800 ">Donepezil</h3>
                            <p class="text-xs text-slate-400 font-semibold ">10mg • Oral Tablet</p>
                        </div>
                        <div class="flex gap-2 ">
                            <button class="p-2 text-blue-600 bg-blue-50 rounded-lg "><i class="fas fa-edit text-xs "></i></button>
                            <button class="p-2 text-red-500 bg-red-50 rounded-lg "><i class="fas fa-trash text-xs "></i></button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-gray-50 ">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest ">Next Dose</span>
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg ">09:00 AM Today</span>
                    </div>
                </div>
            </div>

        </div>

    </main>
</div>
